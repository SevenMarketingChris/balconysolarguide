<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#060d1e"/>
  <!-- Sun -->
  <circle cx="16" cy="10" r="5" fill="#fbbf24"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round">
    <line x1="16" y1="3" x2="16" y2="1"/>
    <line x1="21" y1="5" x2="23" y2="3"/>
    <line x1="23" y1="10" x2="25" y2="10"/>
    <line x1="21" y1="15" x2="23" y2="17"/>
    <line x1="11" y1="5" x2="9" y2="3"/>
    <line x1="9" y1="10" x2="7" y2="10"/>
    <line x1="11" y1="15" x2="9" y2="17"/>
  </g>
  <!-- Solar panel -->
  <g transform="translate(6,18)">
    <rect x="0" y="0" width="20" height="10" rx="1" fill="#1e3a8a"/>
    <!-- Grid lines -->
    <line x1="5" y1="0" x2="5" y2="10" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="10" y1="0" x2="10" y2="10" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="15" y1="0" x2="15" y2="10" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="5" x2="20" y2="5" stroke="#3b82f6" stroke-width="0.5"/>
    <!-- Shine -->
    <rect x="1" y="1" width="3" height="3" rx="0.5" fill="#60a5fa" opacity="0.3"/>
  </g>
</svg>
